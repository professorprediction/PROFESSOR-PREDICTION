<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professor Prediction</title>

<style>
body{
background:#0f2027;
color:white;
text-align:center;
font-family:Arial;
padding:40px 15px;
}

/* Logo */
.profile{
width:170px;
height:170px;
border-radius:50%;
display:block;
margin:0 auto 25px;
border:4px solid cyan;
background:white;
padding:10px;
object-fit:contain;
}

/* Stats Layout */
.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
max-width:400px;
margin:0 auto 40px;
}

.card{
background:#1b3a4b;
padding:20px;
border-radius:10px;
}

.card h2{
color:cyan;
}

/* Accuracy niche full width */
.accuracy{
grid-column:1 / 3;
}

/* Button */
.join-btn{
display:inline-block;
padding:12px 30px;
background:cyan;
color:black;
border-radius:30px;
text-decoration:none;
margin-bottom:40px;
}

/* Countdown */
.countdown-box{
background:#1b3a4b;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}

.countdown{
font-size:40px;
color:cyan;
}
</style>
</head>

<body>

<img src="file_00000000b12472099d50314732deee3e.png" class="profile">

<h1>PROFESSOR PREDICTION</h1>

<div class="stats">

<div class="card">
<h2>100K+</h2>
<p>Members</p>
</div>

<div class="card">
<h2>Daily</h2>
<p>Updates</p>
</div>

<div class="card accuracy">
<h2>99%</h2>
<p>Match Accuracy</p>
</div>

</div>

<a href="#" class="join-btn">Join Telegram</a>

<div class="countdown-box">
<h2>Next Prediction In</h2>
<div class="countdown" id="timer">59</div>
<p>Seconds</p>
</div>

<script>
let timeLeft = 59;
const timer = document.getElementById("timer");

setInterval(() => {
timeLeft--;
if(timeLeft < 0){ timeLeft = 59; }
timer.textContent = timeLeft;
},1000);
</script>

</body>
</html>
